<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>调试面板 · 网络抓包</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Cascadia Code", "Fira Code", "SF Mono", Menlo, monospace;
      background: #1e1e1e; color: #d4d4d4;
      height: 100vh; display: flex; flex-direction: column;
      font-size: 12px; overflow: hidden;
    }

    .header {
      display: flex; align-items: center;
      padding: 0 12px; background: #2d2d2d;
      border-bottom: 1px solid #3c3c3c;
      -webkit-app-region: drag;
      min-height: 36px;
    }
    .tabs {
      display: flex; gap: 2px; flex: 1;
      -webkit-app-region: no-drag;
    }
    .tab {
      padding: 8px 16px; color: #888;
      background: transparent; border: none;
      cursor: pointer; font-size: 12px;
      border-bottom: 2px solid transparent;
      font-family: inherit;
      transition: all 0.15s;
    }
    .tab:hover { color: #ccc; }
    .tab.active { color: #4ec9b0; border-bottom-color: #4ec9b0; }
    .badge {
      display: inline-block; min-width: 16px; height: 16px;
      line-height: 16px; text-align: center;
      background: #e02e24; color: #fff; border-radius: 8px;
      font-size: 10px; margin-left: 4px; padding: 0 4px;
    }

    .toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; background: #252525;
      border-bottom: 1px solid #3c3c3c;
    }
    .toolbar-btn {
      padding: 3px 10px; background: #3c3c3c; border: none;
      color: #ccc; border-radius: 3px; cursor: pointer;
      font-size: 11px; font-family: inherit;
      transition: background 0.15s;
    }
    .toolbar-btn:hover { background: #505050; }
    .toolbar-btn.active { background: #4ec9b0; color: #1e1e1e; }
    .toolbar-info {
      margin-left: auto; color: #666; font-size: 11px;
    }

    .tab-content {
      display: none; flex: 1; overflow: hidden;
      flex-direction: column;
    }
    .tab-content.active { display: flex; }

    .log-area {
      flex: 1; overflow-y: auto; padding: 8px 12px;
      line-height: 1.7;
    }

    .entry { padding: 1px 0; }
    .entry.info { color: #569cd6; }
    .entry.reply { color: #4ec9b0; }
    .entry.error { color: #f44747; }
    .entry.network { color: #dcdcaa; }
    .entry.important { color: #f48771; font-weight: 600; }
    .entry.clickable { cursor: pointer; }
    .entry.clickable:hover { text-decoration: underline; }

    .json-detail {
      display: none; padding: 8px 10px; margin: 2px 0 6px 0;
      background: #2a2a2a; border-radius: 4px;
      color: #9cdcfe; white-space: pre-wrap;
      word-break: break-all; max-height: 300px; overflow-y: auto;
      border-left: 3px solid #4ec9b0; font-size: 11px;
    }
    .json-detail.visible { display: block; }

    .status-bar {
      padding: 4px 12px; background: #007acc; color: #fff;
      font-size: 11px; display: flex; gap: 16px;
    }
    .status-bar .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4caf50; display: inline-block;
      margin-right: 4px; vertical-align: middle;
    }

    .filter-input {
      background: #3c3c3c; border: 1px solid #555;
      color: #d4d4d4; padding: 2px 8px; border-radius: 3px;
      font-size: 11px; font-family: inherit; width: 180px;
      outline: none;
    }
    .filter-input:focus { border-color: #4ec9b0; }
    .filter-input::placeholder { color: #666; }
  </style>
</head>
<body>
  <div class="header">
    <div class="tabs">
      <button class="tab active" data-tab="system">系统日志</button>
      <button class="tab" data-tab="network">网络抓包 <span class="badge" id="networkBadge" style="display:none">0</span></button>
      <button class="tab" data-tab="messages">消息发现 <span class="badge" id="messageBadge" style="display:none">0</span></button>
    </div>
  </div>

  <div class="toolbar">
    <button class="toolbar-btn" id="btnClear">清空</button>
    <button class="toolbar-btn" id="btnAutoScroll" title="自动滚动到底部">自动滚动</button>
    <input class="filter-input" id="filterInput" placeholder="过滤关键词...">
    <span class="toolbar-info" id="countInfo">0 条记录</span>
  </div>

  <div class="tab-content active" id="tabSystem">
    <div class="log-area" id="systemLog"></div>
  </div>
  <div class="tab-content" id="tabNetwork">
    <div class="log-area" id="networkLog"></div>
  </div>
  <div class="tab-content" id="tabMessages">
    <div class="log-area" id="messagesLog"></div>
  </div>

  <div class="status-bar">
    <span><span class="dot" id="statusDot"></span><span id="statusText">监控中</span></span>
    <span id="statsText">网络请求: 0 | 消息接口: 0</span>
  </div>

  <script>
    let autoScroll = true;
    let filterText = '';
    let networkCount = 0;
    let messageCount = 0;
    let activeTab = 'system';

    // ---- 标签页切换 ----
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        activeTab = tab.dataset.tab;
        const map = { system: 'tabSystem', network: 'tabNetwork', messages: 'tabMessages' };
        document.getElementById(map[activeTab]).classList.add('active');

        if (activeTab === 'network') {
          document.getElementById('networkBadge').style.display = 'none';
        }
        if (activeTab === 'messages') {
          document.getElementById('messageBadge').style.display = 'none';
        }
        updateCount();
      });
    });

    // ---- 工具栏 ----
    document.getElementById('btnClear').addEventListener('click', () => {
      document.getElementById('systemLog').innerHTML = '';
      document.getElementById('networkLog').innerHTML = '';
      document.getElementById('messagesLog').innerHTML = '';
      networkCount = 0;
      messageCount = 0;
      updateStats();
      updateCount();
    });

    const scrollBtn = document.getElementById('btnAutoScroll');
    scrollBtn.classList.add('active');
    scrollBtn.addEventListener('click', () => {
      autoScroll = !autoScroll;
      scrollBtn.classList.toggle('active', autoScroll);
    });

    document.getElementById('filterInput').addEventListener('input', (e) => {
      filterText = e.target.value.toLowerCase();
      applyFilter();
    });

    function applyFilter() {
      const map = { system: 'systemLog', network: 'networkLog', messages: 'messagesLog' };
      const container = document.getElementById(map[activeTab]);
      container.querySelectorAll('.entry').forEach(el => {
        if (!filterText || el.textContent.toLowerCase().includes(filterText)) {
          el.style.display = '';
          const next = el.nextElementSibling;
          if (next?.classList.contains('json-detail')) next.style.display = next.classList.contains('visible') ? '' : 'none';
        } else {
          el.style.display = 'none';
          const next = el.nextElementSibling;
          if (next?.classList.contains('json-detail')) next.style.display = 'none';
        }
      });
    }

    function updateCount() {
      const map = { system: 'systemLog', network: 'networkLog', messages: 'messagesLog' };
      const container = document.getElementById(map[activeTab]);
      const count = container.querySelectorAll('.entry').length;
      document.getElementById('countInfo').textContent = `${count} 条记录`;
    }

    function updateStats() {
      document.getElementById('statsText').textContent = `网络请求: ${networkCount} | 消息接口: ${messageCount}`;
    }

    function scrollToBottom(container) {
      if (autoScroll) container.scrollTop = container.scrollHeight;
    }

    // ---- 添加日志 ----
    function addEntry(containerId, type, text, jsonData) {
      const container = document.getElementById(containerId);
      const time = new Date().toLocaleTimeString('zh-CN');

      const el = document.createElement('div');
      el.className = `entry ${type}`;
      el.textContent = `[${time}] ${text}`;

      if (jsonData) {
        el.classList.add('clickable');
        const detail = document.createElement('div');
        detail.className = 'json-detail';
        detail.textContent = typeof jsonData === 'string' ? jsonData : JSON.stringify(jsonData, null, 2);
        el.addEventListener('click', () => detail.classList.toggle('visible'));
        container.appendChild(el);
        container.appendChild(detail);
      } else {
        container.appendChild(el);
      }

      if (filterText && !el.textContent.toLowerCase().includes(filterText)) {
        el.style.display = 'none';
      }

      scrollToBottom(container);
      updateCount();
    }

    // ---- 事件监听 ----
    window.debugApi.onSystemLog((entry) => {
      addEntry('systemLog', entry.type || 'info', entry.text);
    });

    window.debugApi.onApiLog((entry) => {
      const level = /失败|错误|过期/i.test(String(entry?.message || '')) ? 'error' : 'info';
      const shopText = entry?.shopId ? `[${entry.shopId}] ` : '';
      addEntry('systemLog', level, `${shopText}${entry?.message || 'API 日志'}`, entry?.extra || null);
    });

    window.debugApi.onAutoReplySent((data) => {
      addEntry('systemLog', 'reply', `[自动回复] ${data.customer}: ${data.question} → ${data.answer}`);
    });

    window.debugApi.onNetworkLog((entry) => {
      if (entry.type === 'network' || entry.type === 'important') {
        addEntry('networkLog', entry.type, entry.text, entry.data || null);
        networkCount++;
        updateStats();

        if (activeTab !== 'network') {
          const badge = document.getElementById('networkBadge');
          badge.textContent = parseInt(badge.textContent || '0') + 1;
          badge.style.display = '';
        }
      } else {
        addEntry('systemLog', 'info', `[网络监控] ${entry.text}`);
      }
    });

    window.debugApi.onApiTraffic((payload) => {
      const entry = payload?.entry || payload;
      if (!entry) return;
      addEntry('networkLog', 'network',
        `[${entry.method}] ${entry.url} -> ${entry.status}`,
        entry
      );
      networkCount++;
      updateStats();
      if (activeTab !== 'network') {
        const badge = document.getElementById('networkBadge');
        badge.textContent = parseInt(badge.textContent || '0') + 1;
        badge.style.display = '';
      }
    });

    window.debugApi.onNetworkMessageDetected((logEntry) => {
      addEntry('messagesLog', 'important',
        `发现消息接口: ${logEntry.url} (${logEntry.bodySize}B)`,
        logEntry.body
      );
      messageCount++;
      updateStats();

      if (activeTab !== 'messages') {
        const badge = document.getElementById('messageBadge');
        badge.textContent = parseInt(badge.textContent || '0') + 1;
        badge.style.display = '';
      }
    });

    addEntry('systemLog', 'info', '调试面板已打开，正在监听网络请求...');
  </script>
</body>
</html>
