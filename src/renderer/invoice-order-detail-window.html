<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>订单开票</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f5f6f8;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #ffffff;
      border-bottom: 1px solid #e6e8ee;
      -webkit-app-region: drag;
    }
    .toolbar .btn {
      -webkit-app-region: no-drag;
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: 1px solid #d9dce3;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      line-height: 28px;
      text-align: center;
      user-select: none;
    }
    .toolbar .btn:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }
    .toolbar .url {
      -webkit-app-region: no-drag;
      flex: 1;
      height: 30px;
      border-radius: 8px;
      border: 1px solid #d9dce3;
      padding: 0 10px;
      outline: none;
      background: #fafbfc;
      font-size: 12px;
    }
    .toolbar .status {
      -webkit-app-region: no-drag;
      font-size: 12px;
      color: #6b7280;
      min-width: 84px;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .content {
      flex: 1;
      background: #f5f6f8;
    }
  </style>
</head>
<body>
  <div class="toolbar" id="toolbar">
    <button class="btn" id="btnBack" title="后退" disabled>←</button>
    <button class="btn" id="btnForward" title="前进" disabled>→</button>
    <button class="btn" id="btnReload" title="刷新">⟳</button>
    <input class="url" id="urlInput" placeholder="输入链接后回车" />
    <div class="status" id="statusText">就绪</div>
  </div>
  <div class="content"></div>
  <script src="./invoice-order-detail-window.js"></script>
</body>
</html>
