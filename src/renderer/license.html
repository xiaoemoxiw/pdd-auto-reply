<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>软件授权验证</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --primary: #2563eb;
        --danger: #dc2626;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      }
      .wrap {
        padding: 18px 18px 16px;
      }
      .title {
        font-size: 16px;
        font-weight: 600;
        margin: 0 0 6px;
      }
      .desc {
        font-size: 12px;
        color: var(--muted);
        margin: 0 0 14px;
        line-height: 1.4;
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      input {
        flex: 1;
        height: 34px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0 10px;
        font-size: 13px;
        outline: none;
      }
      input:focus {
        border-color: rgba(37, 99, 235, 0.6);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      }
      button {
        height: 34px;
        border: 0;
        border-radius: 8px;
        padding: 0 14px;
        background: var(--primary);
        color: #fff;
        font-size: 13px;
        cursor: pointer;
      }
      button[disabled] {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .status {
        margin-top: 12px;
        font-size: 12px;
        color: var(--muted);
        min-height: 18px;
      }
      .status.error {
        color: var(--danger);
      }
      .meta {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .tag {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px 10px;
        background: #fafafa;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p class="title">授权验证</p>
      <p class="desc">请输入授权码完成验证。授权通过后才能进入系统。</p>

      <div class="row">
        <input id="code" placeholder="请输入授权码（如 XXX-XXX-XXX-XXX）" autocomplete="off" />
        <button id="btn">验证</button>
      </div>

      <div id="status" class="status"></div>
      <div id="meta" class="meta" style="display: none"></div>
    </div>

    <script src="./license-window.js"></script>
  </body>
</html>
